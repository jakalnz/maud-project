<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clinical Skills Dashboard — UoA Audiology</title>
<style>
:root {
  --bg: #f8f7f4; --surface: #ffffff; --text: #1a1a1a; --text-muted: #6b6b68;
  --text-hint: #9b9b97; --border: rgba(0,0,0,0.1); --border-strong: rgba(0,0,0,0.2);
  --accent: #185FA5; --accent-bg: #E6F1FB; --accent-text: #0C447C;
  --green: #639922; --green-bg: #EAF3DE; --green-text: #3B6D11;
  --amber: #EF9F27; --amber-bg: #FAEEDA; --amber-text: #854F0B;
  --red: #E24B4A; --red-bg: #FCEBEB; --red-text: #A32D2D;
  --gray-bg: #F1EFE8; --teal: #1D9E75; --teal-bg: #E1F5EE; --teal-text: #0F6E56;
  --purple: #534AB7; --purple-bg: #EEEDFE; --purple-text: #3C3489;
  --coral: #D85A30; --coral-bg: #FAECE7; --coral-text: #993C1D;
  --radius: 8px; --radius-lg: 12px;
  --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #1a1a1a; --surface: #2a2a2a; --text: #e8e8e4; --text-muted: #a0a09c;
    --text-hint: #6b6b68; --border: rgba(255,255,255,0.1); --border-strong: rgba(255,255,255,0.2);
    --accent: #85B7EB; --accent-bg: #0C447C; --accent-text: #B5D4F4;
    --green-bg: #27500A; --green-text: #C0DD97;
    --amber-bg: #633806; --amber-text: #FAC775;
    --red-bg: #501313; --red-text: #F7C1C1;
    --gray-bg: #333; --teal-bg: #085041; --teal-text: #9FE1CB;
    --purple-bg: #3C3489; --purple-text: #CECBF6;
    --coral-bg: #712B13; --coral-text: #F5C4B3;
  }
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text);line-height:1.5}
.container{max-width:1020px;margin:0 auto;padding:1.5rem 1rem}
h1{font-size:20px;font-weight:500;margin-bottom:4px}
.subtitle{font-size:13px;color:var(--text-muted);margin-bottom:1.5rem}
.demo-banner{background:var(--amber-bg);color:var(--amber-text);font-size:12px;padding:6px 12px;border-radius:var(--radius);margin-bottom:1rem;display:none}
.demo-banner.visible{display:block}
.controls{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:1.25rem;align-items:end}
.control-group{display:flex;flex-direction:column;gap:4px}
.control-group label{font-size:11px;color:var(--text-hint);text-transform:uppercase;letter-spacing:.5px}
select{font-size:13px;padding:6px 28px 6px 10px;border:0.5px solid var(--border-strong);border-radius:var(--radius);background:var(--surface);color:var(--text);font-family:var(--font);appearance:none;background-image:url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L5 5L9 1' stroke='%236b6b68' stroke-width='1.5' stroke-linecap='round'/%3E%3C/svg%3E");background-repeat:no-repeat;background-position:right 8px center;cursor:pointer}
.view-tabs{display:flex;gap:2px;background:var(--gray-bg);border-radius:var(--radius);padding:3px;margin-bottom:1.25rem;width:fit-content}
.view-tab{padding:5px 16px;font-size:12px;border-radius:6px;border:none;cursor:pointer;background:transparent;color:var(--text-muted);font-family:var(--font)}
.view-tab.active{background:var(--surface);color:var(--text);font-weight:500}
.clinic-tabs{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:1rem}
.clinic-tab{padding:5px 12px;font-size:12px;border-radius:var(--radius);border:0.5px solid var(--border);cursor:pointer;background:transparent;color:var(--text-muted);font-family:var(--font)}
.clinic-tab.active{background:var(--accent-bg);color:var(--accent-text);border-color:var(--accent)}
.legend{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:1rem;font-size:11px;color:var(--text-muted)}
.legend-item{display:flex;align-items:center;gap:4px}
.legend-pip{width:10px;height:10px;border-radius:50%}
.section{margin-bottom:1.5rem}
.section-hdr{font-size:12px;font-weight:500;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;padding-bottom:6px;border-bottom:0.5px solid var(--border);margin-bottom:6px}
.skill-row{display:grid;grid-template-columns:minmax(0,1.2fr) repeat(3,46px) 28px 28px;align-items:center;gap:4px;padding:6px 8px;border-radius:6px;font-size:12px}
.skill-row:nth-child(even){background:var(--gray-bg)}
.skill-name{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text)}
.cell{width:36px;height:26px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;justify-self:center}
.cell.green{background:var(--green-bg);color:var(--green-text)}
.cell.amber{background:var(--amber-bg);color:var(--amber-text)}
.cell.red{background:var(--red-bg);color:var(--red-text)}
.cell.na{background:transparent;color:var(--text-hint);font-size:10px}
.cell.expected{background:transparent;color:var(--text-hint);font-size:10px;border:0.5px dashed var(--border)}
.flag-pip{width:16px;display:flex;align-items:center;justify-content:center;justify-self:center;font-size:13px}
.flag-pip.pri{color:var(--amber-text)}
.flag-pip.str{color:var(--green-text)}
.col-headers{display:grid;grid-template-columns:minmax(0,1.2fr) repeat(3,46px) 28px 28px;gap:4px;padding:2px 8px;font-size:10px;color:var(--text-hint)}
.col-headers span{text-align:center}
.summary-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:1.25rem}
.summary-card{background:var(--gray-bg);border-radius:var(--radius);padding:12px 14px}
.summary-card .sc-label{font-size:11px;color:var(--text-hint);margin-bottom:2px}
.summary-card .sc-value{font-size:22px;font-weight:500}
.summary-card .sc-detail{font-size:11px;color:var(--text-muted);margin-top:2px}
.student-name-link{color:var(--accent-text);cursor:pointer;text-decoration:none;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.student-name-link:hover{text-decoration:underline}
.back-btn{font-size:12px;color:var(--accent-text);cursor:pointer;border:none;background:none;font-family:var(--font);padding:4px 0;margin-bottom:.75rem;display:none}
.back-btn:hover{text-decoration:underline}
.back-btn.visible{display:block}
.loading{text-align:center;padding:3rem;color:var(--text-hint)}
.prog-row{display:grid;grid-template-columns:minmax(0,1fr) 220px 60px 36px;align-items:center;gap:8px;padding:7px 8px;font-size:12px;border-bottom:0.5px solid var(--border)}
.prog-row:nth-child(even){background:var(--gray-bg);border-radius:6px}
.sparkline-container{height:32px;position:relative}
.prog-current{font-size:12px;font-weight:500;text-align:center}
.prog-trend{font-size:11px;text-align:center}
.prog-col-headers{display:grid;grid-template-columns:minmax(0,1fr) 220px 60px 36px;gap:8px;padding:2px 8px;font-size:10px;color:var(--text-hint)}
.clinic-badge{display:inline-block;font-size:10px;padding:1px 6px;border-radius:4px;font-weight:400}
.clinic-badge.cb-adx{background:var(--accent-bg);color:var(--accent-text)}
.clinic-badge.cb-pdx{background:var(--purple-bg);color:var(--purple-text)}
.clinic-badge.cb-arh{background:var(--teal-bg);color:var(--teal-text)}
.clinic-badge.cb-prh{background:var(--coral-bg);color:var(--coral-text)}
.clinic-badge.cb-oth{background:var(--gray-bg);color:var(--text-muted)}
.cohort-row{display:grid;align-items:center;gap:4px;padding:4px 8px;font-size:12px;border-bottom:0.5px solid var(--border)}
.vert-label{text-align:center;writing-mode:vertical-rl;transform:rotate(180deg);height:55px;overflow:hidden;font-size:10px;color:var(--text-hint)}
/* Hours view */
.hours-target-table{width:100%;border-collapse:collapse;font-size:12px;margin-bottom:1.5rem}
.hours-target-table th{font-size:10px;font-weight:500;color:var(--text-hint);text-transform:uppercase;letter-spacing:.5px;padding:4px 8px;text-align:right;border-bottom:0.5px solid var(--border)}
.hours-target-table th:first-child{text-align:left}
.hours-target-table td{padding:5px 8px;text-align:right;border-bottom:0.5px solid var(--border)}
.hours-target-table td:first-child{text-align:left;white-space:nowrap}
.hours-target-table tr:nth-child(even) td{background:var(--gray-bg)}
.hrs-cell{display:inline-flex;align-items:center;justify-content:center;min-width:42px;height:22px;border-radius:4px;font-size:11px;font-weight:500;padding:0 6px}
.hrs-cell.ok{background:var(--green-bg);color:var(--green-text)}
.hrs-cell.warn{background:var(--amber-bg);color:var(--amber-text)}
.hrs-cell.low{background:var(--red-bg);color:var(--red-text)}
.hrs-cell.tracked{background:var(--gray-bg);color:var(--text-muted)}
.hrs-cell.sim-ok{background:var(--green-bg);color:var(--green-text)}
.hrs-cell.sim-warn{background:var(--amber-bg);color:var(--amber-text)}
.hrs-cell.sim-over{background:var(--red-bg);color:var(--red-text)}
.session-table{width:100%;border-collapse:collapse;font-size:12px}
.session-table th{font-size:10px;font-weight:500;color:var(--text-hint);text-transform:uppercase;letter-spacing:.4px;padding:4px 8px;text-align:left;border-bottom:0.5px solid var(--border);white-space:nowrap;user-select:none}
.session-table th.sortable{cursor:pointer}
.session-table th.sortable:hover{color:var(--text)}
.session-table th.sort-asc::after{content:' ↑'}
.session-table th.sort-desc::after{content:' ↓'}
.session-table td{padding:6px 8px;border-bottom:0.5px solid var(--border);vertical-align:top}
.session-table tr:nth-child(even) td{background:var(--gray-bg)}
.approve-btn{font-size:11px;padding:3px 10px;border-radius:4px;border:0.5px solid var(--border-strong);background:var(--surface);color:var(--text-muted);cursor:pointer;font-family:var(--font);white-space:nowrap;transition:background .2s,color .2s,border-color .2s}
.approve-btn.approved{background:var(--green-bg);color:var(--green-text);border-color:var(--green)}
.approve-btn:hover:not(.approved){background:var(--accent-bg);color:var(--accent-text);border-color:var(--accent)}
.hrs-mini{font-size:11px;color:var(--text-muted)}
.hrs-bar-wrap{height:6px;background:var(--gray-bg);border-radius:3px;margin-top:3px;overflow:hidden}
.hrs-bar{height:6px;border-radius:3px;transition:width .4s}
</style>
</head>
<body>
<div id="authGate" style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:16px;font-family:var(--font)">
  <div style="font-size:22px;font-weight:600;color:var(--text)">MAud Clinical Tracker</div>
  <div style="font-size:14px;color:var(--text-muted)">Clinical skills dashboard</div>
  <!-- Role toggle -->
  <div style="display:flex;background:#f0f0ee;border-radius:8px;padding:3px;gap:2px">
    <button id="roleOptSupervisor" onclick="selectRoleOpt('supervisor')"
      style="padding:7px 20px;border:none;border-radius:6px;font-size:13px;cursor:pointer;font-family:inherit;background:var(--surface);font-weight:500;color:var(--text)">
      Supervisor
    </button>
    <button id="roleOptStudent" onclick="selectRoleOpt('student')"
      style="padding:7px 20px;border:none;border-radius:6px;font-size:13px;cursor:pointer;font-family:inherit;background:transparent;color:#888">
      Student
    </button>
  </div>
  <div id="gSignInBtn"></div>
  <div id="authMsg" style="font-size:13px;color:var(--red);display:none"></div>
</div>
<div id="appShell" style="display:none">
<div class="container">
<h1>Clinical skills dashboard</h1>
<p class="subtitle">MAud programme — skill progression tracking</p>
<div class="demo-banner" id="demoBanner">Demo mode — showing sample data. Connect to Google Sheet to view real student data.</div>
<div class="controls">
  <div class="control-group"><label>Cohort</label><select id="cohortSelect"></select></div>
  <div class="control-group"><label>Student</label><select id="studentSelect"><option value="__overview">— Cohort overview —</option></select></div>
  <div class="control-group"><label>Milestone</label>
    <select id="milestoneSelect">
      <option value="all">All milestones</option>
      <option value="S1">S1 — Semester 1</option>
      <option value="S2">S2 — Semester 2</option>
      <option value="Y2">Y2 — End of Year 2</option>
    </select>
  </div>
  <div class="control-group" style="justify-content:flex-end">
    <button class="view-tab" id="viewToggleBtn" style="padding:6px 16px;border:0.5px solid var(--border);border-radius:var(--radius);background:var(--surface);font-family:var(--font);cursor:pointer">Hours</button>
  </div>
</div>
<button class="back-btn" id="backBtn">&larr; Back to cohort overview</button>
<div class="clinic-tabs" id="clinicTabs"></div>
<div class="legend" id="legendBar">
  <span class="legend-item"><span class="legend-pip" style="background:var(--green)"></span> On track</span>
  <span class="legend-item"><span class="legend-pip" style="background:var(--amber)"></span> 1 below</span>
  <span class="legend-item"><span class="legend-pip" style="background:var(--red)"></span> 2+ below</span>
  <span style="color:var(--text-hint)">— = not assessed</span>
</div>
<div id="summaryCards"></div>
<div id="dashboard"></div>
</div>
<script>
const API_URL='https://script.google.com/macros/s/AKfycbwsc7vAdP7FcmeWK_5TPXJOxXnUBtFVmv_m1cTMp9V7T-PjhnPkbJfh-Pn1Q1-hMIHTTg/exec';

function seededRand(s){var x=Math.sin(s+1)*10000;return x-Math.floor(x)}

function generateDemoRatings(studentId){
  var seed=0; for(var i=0;i<studentId.length;i++) seed+=studentId.charCodeAt(i);
  var data={}; var counter=0;
  CLINIC_TYPES.forEach(function(ct){
    data[ct]={};
    getSkillsForClinic(ct).forEach(function(sk){
      data[ct][sk.id]=[];
      var sessionNum=0;
      MILESTONES.forEach(function(ms, mi){
        var exp=sk['exp'+ms];
        // Sessions per milestone varies by clinic type
        var sessionsInMs=1;
        if(ct==='Adult Diagnostic') sessionsInMs=Math.floor(seededRand(seed+counter*3+mi)*3)+2;
        else if(ct==='Paediatric Diagnostic') sessionsInMs=mi===0?Math.floor(seededRand(seed+counter*5+mi)*2):Math.floor(seededRand(seed+counter*5+mi)*2)+1;
        else if(ct==='Adult Rehabilitation') sessionsInMs=mi===0?Math.floor(seededRand(seed+counter*7+mi)*2):Math.floor(seededRand(seed+counter*7+mi)*2)+1;
        else if(ct==='Paediatric Rehabilitation') sessionsInMs=mi<2?Math.floor(seededRand(seed+counter*11+mi)*2):Math.floor(seededRand(seed+counter*11+mi)*2)+1;
        else sessionsInMs=Math.floor(seededRand(seed+counter*9+mi)*2);
        var prevRating=data[ct][sk.id].length>0?data[ct][sk.id][data[ct][sk.id].length-1].rating:Math.max(1,exp-1);
        for(var s=0;s<sessionsInMs;s++){
          counter++;sessionNum++;
          var drift=seededRand(seed+counter*13);
          var change=drift>0.65?1:drift<0.15?-1:0;
          var r=Math.max(1,Math.min(5,prevRating+change));
          var month=(mi*4)+Math.floor(seededRand(seed+counter*17)*3)+1;
          var day=Math.floor(seededRand(seed+counter*19)*25)+1;
          data[ct][sk.id].push({
            session:sessionNum, milestone:ms, rating:r,
            isPriority:r<exp&&seededRand(seed+counter*23)>0.6,
            isStrength:r>=exp&&seededRand(seed+counter*29)>0.65,
            date:'2025-'+String(Math.min(month,12)).padStart(2,'0')+'-'+String(day).padStart(2,'0')
          });
          prevRating=r;
        }
      });
    });
  });
  return data;
}

/* ===== HELPERS ===== */
function getSkillsForClinic(ct){
  return SKILLS.filter(function(sk){
    var cts=SCOPE_MAP[sk.scope]||[];
    return cts.indexOf(ct)!==-1;
  });
}

function groupByObjective(skills){
  var g={};
  OBJ_ORDER.forEach(function(prefix){
    skills.forEach(function(sk){
      if(sk.objective.indexOf(prefix)===0){
        if(!g[sk.objective]) g[sk.objective]=[];
        if(g[sk.objective].indexOf(sk)===-1) g[sk.objective].push(sk);
      }
    });
  });
  return g;
}

function getExp(sk, ms){ return sk['exp'+ms]||1; }

function getStatus(r, exp){
  if(!r||r===0) return 'na';
  if(r>=exp) return 'green';
  if(r===exp-1) return 'amber';
  return 'red';
}

function getMilestones(){ return currentMilestone==='all'?MILESTONES:[currentMilestone]; }

function getLatestForMilestone(entries, ms){
  if(!entries) return null;
  var filtered=entries.filter(function(e){return e.milestone===ms});
  return filtered.length>0?filtered[filtered.length-1]:null;
}

function getLastN(entries, n){
  if(!entries||entries.length===0) return [];
  return entries.slice(-n);
}

function getTrend(entries){
  if(entries.length<2) return 'flat';
  return entries[entries.length-1].rating>entries[0].rating?'up':entries[entries.length-1].rating<entries[0].rating?'down':'flat';
}

/* ===== SPARKLINE ===== */
function makeSparkline(entries, currentExp, w, h){
  if(entries.length===0) return '<span style="color:var(--text-hint);font-size:11px">No data</span>';
  var n=entries.length, pad=6, plotW=w-pad*2, plotH=h-pad*2;
  var svg='<svg width="'+w+'" height="'+h+'" viewBox="0 0 '+w+' '+h+'" style="overflow:visible">';
  var expY=pad+plotH-((currentExp-1)/4)*plotH;
  svg+='<line x1="'+pad+'" y1="'+Math.round(expY)+'" x2="'+(w-pad)+'" y2="'+Math.round(expY)+'" stroke="var(--border-strong)" stroke-width="1" stroke-dasharray="3,2"/>';
  for(var lv=1;lv<=5;lv++){
    var ly=pad+plotH-((lv-1)/4)*plotH;
    if(lv!==currentExp) svg+='<line x1="'+pad+'" y1="'+Math.round(ly)+'" x2="'+(w-pad)+'" y2="'+Math.round(ly)+'" stroke="var(--border)" stroke-width="0.5"/>';
  }
  var pts=entries.map(function(e,i){
    return{x:n===1?w/2:pad+(i/(n-1))*plotW, y:pad+plotH-((e.rating-1)/4)*plotH,
           r:e.rating, ms:e.milestone, isPri:e.isPriority, isStr:e.isStrength,
           date:e.date||'', sessionId:e.sessionId||''};
  });
  if(pts.length>1) svg+='<polyline points="'+pts.map(function(p){return Math.round(p.x)+','+Math.round(p.y)}).join(' ')+'" fill="none" stroke="var(--accent)" stroke-width="1.5" stroke-linejoin="round"/>';
  pts.forEach(function(p){
    var col=getStatus(p.r,currentExp)==='green'?'var(--green)':getStatus(p.r,currentExp)==='amber'?'var(--amber)':'var(--red)';
    var tip=p.ms+': '+p.r+'/5'+(p.isPri?' · Priority':(p.isStr?' · Strength':''))+' — click to view session';
    svg+='<circle cx="'+Math.round(p.x)+'" cy="'+Math.round(p.y)+'" r="3.5" fill="'+col+'"'
      +' stroke="var(--surface)" stroke-width="1" style="cursor:pointer"'
      +' data-sparkdate="'+(p.date||'')+'" data-sparksession="'+(p.sessionId||'')+'">'
      +'<title>'+tip+'</title></circle>';
    // Priority flag: small amber triangle above dot
    if(p.isPri){
      var tx=Math.round(p.x), ty=Math.round(p.y)-7;
      svg+='<polygon points="'+tx+','+(ty-4)+' '+(tx-3)+','+(ty+2)+' '+(tx+3)+','+(ty+2)+'" fill="#EF9F27" opacity="0.9"><title>Priority</title></polygon>';
    }
    // Strength flag: small green diamond below dot
    if(p.isStr){
      var dx=Math.round(p.x), dy=Math.round(p.y)+7;
      svg+='<polygon points="'+dx+','+(dy-3)+' '+(dx+3)+','+dy+' '+dx+','+(dy+3)+' '+(dx-3)+','+dy+'" fill="#639922" opacity="0.9"><title>Strength</title></polygon>';
    }
  });
  svg+='<text x="1" y="'+(pad+3)+'" font-size="8" fill="var(--text-hint)" font-family="var(--font)">5</text>';
  svg+='<text x="1" y="'+(pad+plotH+1)+'" font-size="8" fill="var(--text-hint)" font-family="var(--font)">1</text>';
  svg+='</svg>';
  return svg;
}

function calcTotals(hrs){
  var adultDx   = (hrs.adultDxObs||0)+(hrs.adultDxTest||0);
  var paedDx    = (hrs.paedDxObs||0)+(hrs.paedDxTest||0);
  var adultRehab= (hrs.adultRehabObs||0)+(hrs.adultRehabTest||0);
  var paedRehab = (hrs.paedRehabObs||0)+(hrs.paedRehabTest||0);
  var other     = (hrs.otherObs||0)+(hrs.otherTest||0);
  var testing   = (hrs.adultDxTest||0)+(hrs.paedDxTest||0)+(hrs.adultRehabTest||0)+(hrs.paedRehabTest||0);
  var observed  = (hrs.adultDxObs||0)+(hrs.paedDxObs||0)+(hrs.adultRehabObs||0)+(hrs.paedRehabObs||0)+(hrs.otherObs||0);
  var total     = adultDx+paedDx+adultRehab+paedRehab+other;
  return {total:total, testing:testing, observed:observed,
          adultDx:adultDx, paedDx:paedDx,
          adultRehab:adultRehab, paedRehab:paedRehab, rehab:adultRehab+paedRehab,
          simulation:hrs.simulation||0, orl:hrs.orl||0, slt:hrs.slt||0,
          supervision:hrs.supervision||0};
}

function hrsStatus(val, min, max){
  if(max!=null){ // simulation — lower is better
    if(val<=max*0.75) return 'sim-ok';
    if(val<=max) return 'sim-warn';
    return 'sim-over';
  }
  if(min==null) return 'tracked';
  if(val>=min) return 'ok';
  if(val>=min*0.75) return 'warn';
  return 'low';
}

function renderHrsCell(val, min, max){
  var cls=hrsStatus(val,min,max);
  var label=val.toFixed(1).replace(/\.0$/,'');
  if(max!=null) label+=' / '+max;
  else if(min!=null) label+=' / '+min;
  return '<span class="hrs-cell '+cls+'">'+label+'</span>';
}

function generateDemoHours(studentId){
  var seed=0; for(var i=0;i<studentId.length;i++) seed+=studentId.charCodeAt(i);
  var sessions=[];
  var r=function(s,base,range){var x=Math.sin(s)*10000;return base+Math.abs(x-Math.floor(x))*range};
  for(var n=1;n<=18;n++){
    var month=Math.ceil(n/1.5); var day=Math.floor(r(seed+n*7,1,27));
    var approved=n<=12;
    sessions.push({
      sessionId:'DEMO-'+studentId+'-'+n,
      date:'2025-'+String(Math.min(month,12)).padStart(2,'0')+'-'+String(Math.min(day,28)).padStart(2,'0'),
      sup1:'Dr Smith', sup2:'',
      activities:'Adult Diagnostic, Adult Rehabilitation',
      hrs:{
        adultDxObs:r(seed+n*11,0,1), adultDxTest:r(seed+n*13,0.5,2),
        paedDxObs:n%3===0?r(seed+n*17,0,1):0, paedDxTest:n%3===0?r(seed+n*19,0.5,1.5):0,
        adultRehabObs:n%2===0?r(seed+n*23,0,1):0, adultRehabTest:n%2===0?r(seed+n*29,0.5,1.5):0,
        paedRehabObs:0, paedRehabTest:0,
        otherObs:0, otherTest:0,
        orl:n%5===0?2:0, slt:n%7===0?2:0,
        simulation:n<=4?2:0, supervision:n%3===0?1:0
      },
      approved:approved, approvedBy:approved?'Dr Smith':''
    });
  }
  return sessions;
}

let hoursData={}; // studentId → sessions array

function loadStudentHours(studentId, callback){
  if(hoursData[studentId]){ callback(hoursData[studentId]); return; }
  if(!API_URL||usingDemo){
    hoursData[studentId]=generateDemoHours(studentId);
    callback(hoursData[studentId]); return;
  }
  fetch(API_URL+'?action=hours&student='+studentId+'&token='+encodeURIComponent(_idToken||''))
    .then(function(r){return r.json();})
    .then(function(d){
      if(d.error){ console.error('Hours API error:',d.error); hoursData[studentId]=[]; }
      else hoursData[studentId]=d.sessions||[];
      callback(hoursData[studentId]);
    })
    .catch(function(e){
      console.error('Hours fetch failed:',e);
      hoursData[studentId]=[];
      callback([]);
    });
}

function loadCohortHours(cohort, callback){
  if(cohortHoursData[cohort]){ callback(cohortHoursData[cohort]); return; }
  if(!API_URL||usingDemo){
    var students=studentsData[cohort]||[];
    cohortHoursData[cohort]=students.map(function(s){
      var sessions=generateDemoHours(s.id);
      var agg={adultDxObs:0,adultDxTest:0,paedDxObs:0,paedDxTest:0,adultRehabObs:0,adultRehabTest:0,
               paedRehabObs:0,paedRehabTest:0,otherObs:0,otherTest:0,orl:0,slt:0,simulation:0,supervision:0};
      sessions.forEach(function(ses){ Object.keys(agg).forEach(function(k){ agg[k]+=(ses.hrs[k]||0); }); });
      var approved=sessions.filter(function(ses){return ses.approved;}).length;
      return {studentId:s.id, studentName:s.name, totals:Object.assign(calcTotals(agg),
              {orl:agg.orl,slt:agg.slt,simulation:agg.simulation,supervision:agg.supervision,
               sessions:sessions.length, approved:approved})};
    });
    callback(cohortHoursData[cohort]); return;
  }
  fetch(API_URL+'?action=cohort_hours&cohort='+cohort+'&token='+encodeURIComponent(_idToken||''))
    .then(function(r){return r.json();})
    .then(function(d){
      if(d.error) console.error('Cohort hours API error:',d.error);
      cohortHoursData[cohort]=d.students||[]; callback(cohortHoursData[cohort]);
    })
    .catch(function(e){ console.error('Cohort hours fetch failed:',e); cohortHoursData[cohort]=[]; callback([]); });
}

let sessionSort={col:'date', dir:1};
let sessionFilter='';
let sessionFilterVisible=false;
let _hoursStudentSessions=[];

// Renders only the table body into #sessionTableWrap — never touches anything outside it
function refreshSessionTable(){
  var wrap=document.getElementById('sessionTableWrap');
  if(!wrap) return;
  var sessions=_hoursStudentSessions;

  var filtered=sessions.filter(function(ses){
    if(!sessionFilter) return true;
    var q=sessionFilter.toLowerCase();
    return (ses.sessionId||'').toLowerCase().indexOf(q)!==-1
      || (ses.date||'').toLowerCase().indexOf(q)!==-1
      || (ses.sup1||'').toLowerCase().indexOf(q)!==-1
      || (ses.sup2||'').toLowerCase().indexOf(q)!==-1;
  });
  var sorted=filtered.slice().sort(function(a,b){
    var va,vb;
    if(sessionSort.col==='date'){ va=a.date; vb=b.date; }
    else if(sessionSort.col==='supervisor'){ va=(a.sup1||'').toLowerCase(); vb=(b.sup1||'').toLowerCase(); }
    else if(sessionSort.col==='sessionId'){ va=a.sessionId||''; vb=b.sessionId||''; }
    else { va=a.approved?1:0; vb=b.approved?1:0; }
    return va<vb?-sessionSort.dir:va>vb?sessionSort.dir:0;
  });

  function th(label, col){
    var active=sessionSort.col===col;
    var cls='sortable'+(active?' sort-'+(sessionSort.dir===1?'asc':'desc'):'');
    return '<th class="'+cls+'" data-sort="'+col+'">'+label+'</th>';
  }

  var countNote=sessionFilter&&filtered.length!==sessions.length
    ?' <span style="font-size:10px;color:var(--text-muted)">'+filtered.length+' of '+sessions.length+'</span>':'';

  var html='<div style="overflow-x:auto"><table class="session-table"><thead>'
    +(sessionFilterVisible
      ?'<tr><td colspan="13" style="padding:4px 0"><input id="sessionFilterInput" type="text"'
        +' placeholder="Filter by session ID, date or supervisor…" value="'+sessionFilter+'"'
        +' style="font-size:12px;padding:4px 10px;border:0.5px solid var(--border-strong);border-radius:var(--radius);'
        +'background:var(--surface);color:var(--text);font-family:var(--font);width:360px">'
        +countNote+'</td></tr>'
      :'')
    +'<tr>'
    +th('Session ID','sessionId')+th('Date','date')+th('Supervisor','supervisor')
    +'<th title="Observed:Tested">Adult Dx</th><th title="Observed:Tested">Paed Dx</th>'
    +'<th title="Observed:Tested">Adult Rehab</th><th title="Observed:Tested">Paed Rehab</th>'
    +'<th title="Observed:Tested">Other</th><th>ORL</th><th>SLT</th><th>Sim</th><th>Supv</th>'
    +th('Reflection','reflection')
    +'<th class="sortable" data-sort="__filter" title="Filter" style="text-align:center">⊞</th>'
    +'</tr></thead><tbody>';

  sorted.forEach(function(ses){
    var n=function(v){return Number(v)||0;};
    var fmt=function(v){return v>0?v.toFixed(1).replace(/\.0$/,''):'<span style="color:var(--text-hint)">—</span>';};
    var pair=function(obs,tst){
      var o=n(obs),t=n(tst);
      if(!o&&!t) return '<span style="color:var(--text-hint)">—</span>';
      return '<span style="font-size:10px">'+fmt(o)+'<span style="color:var(--text-hint)">:</span>'+fmt(t)+'</span>';
    };
    html+='<tr>'
      +'<td style="white-space:nowrap;font-size:10px;color:var(--text-muted);font-family:monospace">'+(ses.sessionId||'—')+'</td>'
      +'<td style="white-space:nowrap">'+ses.date+'</td>'
      +'<td class="hrs-mini">'+(ses.sup1||'')+(ses.sup2?', '+ses.sup2:'')+'</td>'
      +'<td>'+pair(ses.hrs.adultDxObs,ses.hrs.adultDxTest)+'</td>'
      +'<td>'+pair(ses.hrs.paedDxObs,ses.hrs.paedDxTest)+'</td>'
      +'<td>'+pair(ses.hrs.adultRehabObs,ses.hrs.adultRehabTest)+'</td>'
      +'<td>'+pair(ses.hrs.paedRehabObs,ses.hrs.paedRehabTest)+'</td>'
      +'<td>'+pair(ses.hrs.otherObs,ses.hrs.otherTest)+'</td>'
      +'<td>'+fmt(n(ses.hrs.orl))+'</td><td>'+fmt(n(ses.hrs.slt))+'</td>'
      +'<td>'+fmt(n(ses.hrs.simulation))+'</td><td>'+fmt(n(ses.hrs.supervision))+'</td>'
      +'<td><button class="approve-btn'+(ses.approved?' approved':'')+'" data-session="'+ses.sessionId+'">'
      +(ses.approved?('✓ '+(ses.approvedBy||'Approved')):'Approve reflection')+'</button></td>'
      +'<td></td>'
      +'</tr>';
  });
  html+='</tbody></table></div>';
  wrap.innerHTML=html;

  // Focus filter input if visible
  if(sessionFilterVisible){
    var inp=document.getElementById('sessionFilterInput');
    if(inp){ inp.focus(); inp.setSelectionRange(inp.value.length,inp.value.length); }
  }
}

function renderHoursStudent(){
  // Don't clear a pre-set filter (e.g. from sparkline click navigation)
  if(!sessionFilter){ sessionFilterVisible=false; }
  _hoursStudentSessions=[];
  document.getElementById('summaryCards').innerHTML='<div class="loading">Loading hours…</div>';
  document.getElementById('dashboard').innerHTML='';
  loadStudentHours(currentStudent, function(sessions){
    _hoursStudentSessions=sessions;
    var agg={adultDxObs:0,adultDxTest:0,paedDxObs:0,paedDxTest:0,adultRehabObs:0,adultRehabTest:0,
             paedRehabObs:0,paedRehabTest:0,otherObs:0,otherTest:0,orl:0,slt:0,simulation:0,supervision:0};
    sessions.forEach(function(s){ Object.keys(agg).forEach(function(k){ agg[k]+=(s.hrs[k]||0); }); });
    var t=Object.assign(calcTotals(agg),{orl:agg.orl,slt:agg.slt,simulation:agg.simulation,supervision:agg.supervision});

    var cards='<div class="summary-cards">';
    HRS_TARGETS.forEach(function(target){
      var val=t[target.key]||0;
      var cls=hrsStatus(val,target.min,target.max);
      var colMap={ok:'var(--green)',warn:'var(--amber)',low:'var(--red)',tracked:'var(--accent)',
                  'sim-ok':'var(--green)','sim-warn':'var(--amber)','sim-over':'var(--red)'};
      var col=colMap[cls]||'var(--accent)';
      var barPct=target.max!=null?Math.min(100,Math.round(val/target.max*100))
                :target.min!=null?Math.min(100,Math.round(val/target.min*100)):0;
      var suffix=target.max!=null?(' / '+target.max+' max'):target.min!=null?(' / '+target.min+' target'):'';
      cards+='<div class="summary-card"><div class="sc-label">'+target.label+'</div>'
        +'<div class="sc-value" style="color:'+col+';font-size:18px">'+val.toFixed(1).replace(/\.0$/,'')
        +'<span style="font-size:13px;font-weight:400;color:var(--text-hint)">'+suffix+'</span></div>'
        +(target.showBar?'<div class="hrs-bar-wrap"><div class="hrs-bar" style="width:'+barPct+'%;background:'+col+'"></div></div>':'')
        +'</div>';
    });
    cards+='</div>';
    document.getElementById('summaryCards').innerHTML=cards;

    var approved=sessions.filter(function(s){return s.approved;}).length;
    document.getElementById('dashboard').innerHTML=
      '<div style="display:flex;align-items:center;margin-bottom:8px">'
      +'<div class="section-hdr" style="border:none;margin:0">Sessions ('
      +sessions.length+' total · '+approved+' reflection approved)</div></div>'
      +'<div id="sessionTableWrap"></div>';
    refreshSessionTable();
  });
}

document.getElementById('dashboard').addEventListener('input',function(e){
  if(e.target.id==='sessionFilterInput'){
    sessionFilter=e.target.value;
    refreshSessionTable();
  }
});

document.getElementById('dashboard').addEventListener('click',function(e){
  // Sort header click
  var th=e.target.closest('th[data-sort]');
  if(th){
    var col=th.dataset.sort;
    if(col==='__filter'){
      sessionFilterVisible=!sessionFilterVisible;
      if(!sessionFilterVisible) sessionFilter='';
      refreshSessionTable();
    } else {
      if(sessionSort.col===col) sessionSort.dir*=-1;
      else { sessionSort.col=col; sessionSort.dir=1; }
      refreshSessionTable();
    }
    return;
  }
  // Approve button
  var btn=e.target.closest('.approve-btn');
  if(btn&&!btn.classList.contains('approved')){
    var name=supervisorName||prompt('Your name (saved for this session):');
    if(!name) return;
    supervisorName=name; localStorage.setItem('maud_supervisor',name);
    btn.disabled=true; btn.textContent='Saving…';
    var sessionId=btn.dataset.session;
    if(!API_URL||usingDemo){
      btn.classList.add('approved'); btn.textContent='✓ '+name; btn.disabled=false;
      // update cache
      if(hoursData[currentStudent]){
        var ses=hoursData[currentStudent].find(function(s){return s.sessionId===sessionId;});
        if(ses){ses.approved=true;ses.approvedBy=name;}
      }
      return;
    }
    fetch(API_URL,{method:'POST',headers:{'Content-Type':'text/plain'},
      body:JSON.stringify({action:'approveSession',token:_idToken,sessionId:sessionId,approvedBy:name})})
      .then(function(r){return r.json();})
      .then(function(res){
        if(res.error) throw new Error(res.error);
        btn.classList.add('approved'); btn.textContent='✓ '+name; btn.disabled=false;
        if(hoursData[currentStudent]){
          var ses=hoursData[currentStudent].find(function(s){return s.sessionId===sessionId;});
          if(ses){ses.approved=true;ses.approvedBy=name;}
        }
      })
      .catch(function(err){ btn.textContent='Error — retry'; btn.disabled=false; console.error(err); });
    return;
  }
  // Sparkline dot → hours view with session highlighted
  var dot=e.target.closest('circle[data-sparkdate]');
  if(dot){
    var sid=dot.getAttribute('data-sparksession');
    var ddate=dot.getAttribute('data-sparkdate');
    // Set filter before render so renderHoursStudent picks it up after load
    sessionFilter=sid||ddate.substring(0,10);
    sessionFilterVisible=true;
    currentView='hours';
    render();
    return;
  }
  // Rating cell in cohort overview → that student's progression
  var cell=e.target.closest('.cell[data-student]');
  if(cell){
    selectStudent(cell.dataset.student,'skills');
    return;
  }
  // Student name link in hours cohort view
  var l=e.target.closest('.student-name-link[data-view="hours"]');
  if(l){ selectStudent(l.dataset.student,'skills'); return; }
  // Normal student name link (skills views)
  var sk=e.target.closest('.student-name-link:not([data-view])');
  if(sk){ selectStudent(sk.dataset.student); }
});

function render(){
  var isIndividual = currentStudent !== '__overview';
  var isHours = currentView === 'hours';

  document.getElementById('backBtn').classList.toggle('visible', isIndividual);

  // Toggle button: text flips between Hours / Skills
  var vtb = document.getElementById('viewToggleBtn');
  if(vtb){ vtb.textContent = isHours ? 'Skills' : 'Hours'; }

  // Clinic tabs + legend + milestone only relevant for skills views
  var showSkillsControls = !isHours;
  document.getElementById('clinicTabs').style.display = showSkillsControls ? '' : 'none';
  document.getElementById('legendBar').style.display = showSkillsControls && !isIndividual ? '' : 'none';
  document.getElementById('milestoneSelect').parentElement.style.display = showSkillsControls ? '' : 'none';

  if(isHours){
    if(isIndividual) renderHoursStudent();
    else renderHoursCohort();
  } else if(isIndividual){
    // Individual student always shows progression
    renderProgressionStudent();
  } else {
    // Cohort always shows snapshot grid
    renderCohortOverview();
  }
}

/* ===== DATA LOADING ===== */
function loadDemoForCohort(cohort){
  usingDemo=true;
  document.getElementById('demoBanner').classList.add('visible');
  studentsData[cohort]=DEMO_STUDENTS[cohort]||[];
  studentsData[cohort].forEach(function(s){ if(!ratingsData[s.id]) ratingsData[s.id]=generateDemoRatings(s.id); });
  populateStudentSelect(studentsData[cohort]);
  render();
}

function populateStudentSelect(students){
  var ss=document.getElementById('studentSelect');
  ss.innerHTML='<option value="__overview">&mdash; Cohort overview &mdash;</option>';
  students.forEach(function(s){ ss.innerHTML+='<option value="'+s.id+'">'+s.name+'</option>'; });
  currentStudent='__overview'; ss.value='__overview';
}

function loadCohort(cohort){
  currentCohort=cohort;
  if(!API_URL){ loadDemoForCohort(cohort); return; }
  document.getElementById('dashboard').innerHTML='<div class="loading">Loading…</div>';
  // Fetch students from API
  fetch(API_URL+'?action=students&cohort='+cohort+'&token='+encodeURIComponent(_idToken||''))
    .then(function(r){ return r.json(); })
    .then(function(data){
      var students=data.students||[];
      studentsData[cohort]=students;
      if(students.length===0){
        // No real students yet — fall back to demo
        loadDemoForCohort(cohort, pickFirstStudent); return;
      }
      usingDemo=false;
      document.getElementById('demoBanner').classList.remove('visible');
      populateStudentSelect(students);
      // Fetch cohort overview ratings
      return fetch(API_URL+'?action=cohort_overview&cohort='+cohort+'&token='+encodeURIComponent(_idToken||''))
        .then(function(r){ return r.json(); })
        .then(function(overview){
          (overview.overview||[]).forEach(function(stu){
            // Convert flat API ratings to the session-array format expected by the dashboard
            // API returns: { studentId, milestones: { ms: { skillId: { rating, isPriority, isStrength } } } }
            var byCtBySkill={};
            CLINIC_TYPES.forEach(function(ct){ byCtBySkill[ct]={}; });
            // We only have latest-per-milestone from the overview; build single-entry arrays
            Object.keys(stu.milestones||{}).forEach(function(ms){
              Object.keys(stu.milestones[ms]).forEach(function(skillId){
                var sk=SKILLS.find(function(x){ return x.id===skillId; });
                if(!sk) return;
                var cts=SCOPE_MAP[sk.scope]||[];
                cts.forEach(function(ct){
                  if(!byCtBySkill[ct][skillId]) byCtBySkill[ct][skillId]=[];
                  var entry=stu.milestones[ms][skillId];
                  byCtBySkill[ct][skillId].push({
                    session:1, milestone:ms, rating:entry.rating,
                    isPriority:entry.isPriority||false, isStrength:entry.isStrength||false, date:''
                  });
                });
              });
            });
            ratingsData[stu.studentId]=byCtBySkill;
          });
          render();
        });
    })
    .catch(function(){ loadDemoForCohort(cohort, pickFirstStudent); });
}

/* Load full per-session ratings for a student, then render. Falls back to existing data if API unavailable. */
function selectStudent(studentId, viewOverride){
  currentStudent=studentId;
  document.getElementById('studentSelect').value=studentId;
  if(viewOverride) currentView=viewOverride;
  else if(currentView!=='hours') currentView='skills';

  // If overview or no API or demo, just render with what we have
  if(studentId==='__overview'||!API_URL||usingDemo){ render(); return; }

  // If already loaded full session data (has entries with sessionId), render immediately
  var existing=ratingsData[studentId]||{};
  var firstCt=Object.values(existing)[0]||{};
  var firstSkill=Object.values(firstCt)[0]||[];
  if(firstSkill.length>0&&firstSkill[0].sessionId){ render(); return; }

  // Fetch full per-session ratings
  document.getElementById('dashboard').innerHTML='<div class="loading">Loading student data…</div>';
  fetch(API_URL+'?action=ratings&student='+encodeURIComponent(studentId)+'&cohort='+currentCohort+'&token='+encodeURIComponent(_idToken||''))
    .then(function(r){ return r.json(); })
    .then(function(data){
      var rows=data.ratings||[];
      var byCtBySkill={};
      CLINIC_TYPES.forEach(function(ct){ byCtBySkill[ct]={}; });
      rows.forEach(function(row){
        var ct=row.clinicType, skId=row.skillId;
        if(!byCtBySkill[ct]) byCtBySkill[ct]={};
        if(!byCtBySkill[ct][skId]) byCtBySkill[ct][skId]=[];
        byCtBySkill[ct][skId].push({
          session: row.sessionId,
          sessionId: row.sessionId,
          milestone: row.milestone,
          rating: Number(row.rating)||0,
          isPriority: row.isPriority===true||row.isPriority==='TRUE',
          isStrength: row.isStrength===true||row.isStrength==='TRUE',
          date: row.date||row.timestamp||''
        });
      });
      // Sort each skill's entries by date ascending
      Object.values(byCtBySkill).forEach(function(skMap){
        Object.values(skMap).forEach(function(arr){
          arr.sort(function(a,b){ return a.date<b.date?-1:a.date>b.date?1:0; });
        });
      });
      ratingsData[studentId]=byCtBySkill;
      render();
    })
    .catch(function(){ render(); }); // fall back to overview data on error
}

function init(){
  if(!API_URL){
    var cs=document.getElementById('cohortSelect');
    cs.innerHTML='<option value="2025">MAud 2025</option><option value="2026">MAud 2026</option>';
    loadDemoForCohort('2025'); return;
  }
  fetch(API_URL+'?action=config')
    .then(function(r){ return r.json(); })
    .then(function(cfg){
      var cs=document.getElementById('cohortSelect');
      cs.innerHTML='';
      var active=(cfg.cohorts||[]).filter(function(c){ return c.active; });
      var archived=(cfg.cohorts||[]).filter(function(c){ return !c.active; });
      active.forEach(function(c){ cs.innerHTML+='<option value="'+c.year+'">'+c.label+'</option>'; });
      if(archived.length){
        cs.innerHTML+='<optgroup label="Archived">';
        archived.forEach(function(c){ cs.innerHTML+='<option value="'+c.year+'">'+c.label+'</option>'; });
        cs.innerHTML+='</optgroup>';
      }
      if(active.length) loadCohort(String(active[0].year));
      else if(cfg.cohorts&&cfg.cohorts.length) loadCohort(String(cfg.cohorts[0].year));
      else loadDemoForCohort('2025');
    })
    .catch(function(){ loadDemoForCohort('2025'); });
}
