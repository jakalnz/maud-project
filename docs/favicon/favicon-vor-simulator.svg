<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Concept 1: Eye held steady while head rotates -->
  <rect width="64" height="64" rx="14" fill="#0B1E3B"/>
  <!-- rotation arrows around the eye -->
  <path d="M32 8 A24 24 0 0 1 54 26" fill="none" stroke="#38BDF8" stroke-width="5" stroke-linecap="round"/>
  <polygon points="54,26 60,22 57,31" fill="#38BDF8"/>
  <path d="M32 56 A24 24 0 0 1 10 38" fill="none" stroke="#38BDF8" stroke-width="5" stroke-linecap="round"/>
  <polygon points="10,38 4,42 7,33" fill="#38BDF8"/>
  <!-- eye -->
  <path d="M14 32 Q32 18 50 32 Q32 46 14 32 Z" fill="#F8FAFC"/>
  <circle cx="32" cy="32" r="8" fill="#0B1E3B"/>
  <circle cx="32" cy="32" r="4" fill="#38BDF8"/>
</svg>
