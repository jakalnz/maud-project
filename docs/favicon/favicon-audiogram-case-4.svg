<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <circle cx="16" cy="16" r="15" fill="#5b4a8a"/>
  <!-- faint audiogram grid -->
  <g stroke="#f0edf8" stroke-width="0.6" opacity="0.5">
    <line x1="6" y1="8" x2="26" y2="8"/>
    <line x1="6" y1="13" x2="26" y2="13"/>
    <line x1="6" y1="18" x2="26" y2="18"/>
    <line x1="6" y1="23" x2="26" y2="23"/>
  </g>
  <!-- O symbol (right ear) -->
  <circle cx="11" cy="12" r="3.1" fill="none" stroke="#f0edf8" stroke-width="1.8"/>
  <!-- X symbol (left ear) -->
  <g stroke="#f0edf8" stroke-width="1.8" stroke-linecap="round">
    <line x1="18.5" y1="17.5" x2="23.5" y2="22.5"/>
    <line x1="23.5" y1="17.5" x2="18.5" y2="22.5"/>
  </g>
  <!-- connecting trace -->
  <path d="M11 12 L21 20" stroke="#f0edf8" stroke-width="1" stroke-dasharray="1.5,1.5" opacity="0.7"/>
  <!-- number badge -->
  <circle cx="25" cy="7" r="5.5" fill="#f4c453"/>
  <text x="25" y="10" font-size="8" font-family="Arial, sans-serif" font-weight="bold" fill="#5b4a8a" text-anchor="middle">4</text>
</svg>
